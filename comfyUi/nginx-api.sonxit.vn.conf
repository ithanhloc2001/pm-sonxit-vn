server {
    listen 80;
    server_name api.sonxit.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.sonxit.vn;

    # ── SSL ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.sonxit.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sonxit.vn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Upload size (ảnh tối đa 20MB) ─────────────────────────────────────────
    client_max_body_size 25M;

    # ── Timeout cho job AI dài ────────────────────────────────────────────────
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;
    proxy_connect_timeout 10s;

    # ── Headers ───────────────────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Rate limiting: 30 req/phút/IP cho endpoint xử lý ảnh ─────────────────
    limit_req_zone $binary_remote_addr zone=comfyui_api:10m rate=30r/m;

    # ── Proxy → FastAPI ───────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8000;
    }

    # Endpoint nặng: giới hạn rate
    location ~ ^/(rechange-image) {
        limit_req zone=comfyui_api burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff always;
    add_header X-Frame-Options         DENY    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/comfyui-api.access.log;
    error_log  /var/log/nginx/comfyui-api.error.log;
}
